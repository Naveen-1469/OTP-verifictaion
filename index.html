<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP-verification</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body>
    <div class="side-menu">
      <h2>Menu</h2>
      <a href="#"><i class="fas fa-tachometer-alt"></i>Dashboard</a>
      <a href="#"><i class="fas fa-user"></i>Profile</a>
      <button class="dropdown-btn">
        <i class="fas fa-cog"></i> Settings <i class="fas fa-caret-down"></i>
      </button>
      <div class="dropdown-container">
        <a href="#"><i class="fas fa-user-cog"></i>Account</a>
        <a href="#"><i class="fas fa-shield-alt"></i>Security</a>
      </div>
      <a href="#" class="active">
        <i class="fas fa-lock"></i> OTP Verification</a
      >
      <a href="#"><i class="fas fa-sign-out-alt"></i>Logout</a>
    </div>

    <div class="main-content">
      <div class="otp-container">
        <h2>Enter O.T.P</h2>
        <form id="otp-form">
          <div class="otp-inputs">
            <input type="text" maxlength="1" pattern="0-9" required size="1" />

            <input type="text" maxlength="1" pattern="0-9" required size="1" />

            <input type="text" maxlength="1" pattern="0-9" required size="1" />

            <input type="text" maxlength="1" pattern="0-9" required size="1" />
          </div>
          <br />
          <button type="submit">O.T.P Verification</button>
          <button type="button" class="resend-btn" id="resendBtn">
            Resend O.T.P
          </button>
          <div class="timer" id="timer">Resend in 30s</div>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
